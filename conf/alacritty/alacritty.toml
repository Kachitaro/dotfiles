[window]
opacity = 0.95
dynamic_title = true

[window.padding]
x = 8
y = 6

[font]
size = 11.5

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true

[cursor.style]
shape = "Beam"
blinking = "On"

[general]
live_config_reload = true