[window]
opacity = 0.95
dynamic_title = true
decorations = "none"

[window.padding]
x = 8
y = 6

[font]
size = 10.5

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true

[cursor.style]
shape = "Beam"
blinking = "On"

[general]
live_config_reload = true
import = [ 
    "~/.config/alacritty/keybindings.toml",
    "~/.config/alacritty/themes/catppuccin-macchiato.toml"
]

[terminal.shell]
program = "/usr/bin/tmux"
args = ["new-session", "-A", "-s", "main"]
